name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  msrv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MSRV Rust (1.86)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0

      - name: Build with MSRV
        run: cargo check

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rustfmt check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build docs with warnings denied
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --document-private-items

      - name: Run tests
        run: cargo test

  fuzz:
    runs-on: ubuntu-latest
    env:
      CARGO_FUZZ_VERSION: 0.12.0
      FUZZ_TIME: 60
    strategy:
      matrix:
        include:
          - fuzz_target: build_query
          - fuzz_target: build_query_structured
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo-fuzz binary
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/cargo-fuzz
          key: cargo-fuzz-bin-${{ env.CARGO_FUZZ_VERSION }}

      - name: Add cargo-fuzz bin path
        run: echo "${{ runner.tool_cache }}/cargo-fuzz/bin" >> $GITHUB_PATH

      - name: Install cargo-fuzz
        run: cargo install --root "${{ runner.tool_cache }}/cargo-fuzz" --version ${{ env.CARGO_FUZZ_VERSION }} cargo-fuzz --locked

      - name: Build fuzz target
        run: cargo fuzz build ${{ matrix.fuzz_target }}

      - name: Run fuzz smoke test
        run: cargo fuzz run ${{ matrix.fuzz_target }} -- -max_total_time=${{ env.FUZZ_TIME }}

      - name: Upload fuzz artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzing-artifacts-${{ matrix.fuzz_target }}-${{ github.sha }}
          path: fuzz/artifacts
